# XIAO nRF52840 Sense
CONFIG_LSM6DSL=y  # LSM6DS3TR-C uses the lsm6dsl driver (not lsm6dso)
CONFIG_LSM6DSL_TRIGGER_OWN_THREAD=y
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# BLE running speed & cadence peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OpenStride"

# 0x0441 = 1089, appears as "Running/Walking Sensor, In-Shoe"
CONFIG_BT_DEVICE_APPEARANCE=1089
CONFIG_BT_SMP=y
