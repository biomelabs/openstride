# XIAO nRF52840 Sense
CONFIG_LSM6DSL=y  # LSM6DS3TR-C uses the lsm6dsl driver (not lsm6dso)
CONFIG_LSM6DSL_TRIGGER_OWN_THREAD=y
CONFIG_LSM6DSL_THREAD_STACK_SIZE=4096
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# BLE running speed & cadence peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OpenStride"

# 0x0441 = 1089, appears as "Running/Walking Sensor, In-Shoe"
CONFIG_BT_DEVICE_APPEARANCE=1089
CONFIG_BT_SMP=y

# Standard BLE Battery Service (0x180F) + ADC for VBAT reading on P0.31 (AIN7)
CONFIG_BT_BAS=y
CONFIG_ADC=y

# 1024 bytes isn't enough for the GATT notify call stack from bt_bas_set_battery_level
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
