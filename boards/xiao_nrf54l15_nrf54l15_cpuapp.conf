# XIAO nRF54L15
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSO=y
CONFIG_LSM6DSO_TRIGGER_OWN_THREAD=y

# BLE running speed & cadence peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OpenStride"

# 0x0441 = 1089, appears as "Running/Walking Sensor, In-Shoe"
CONFIG_BT_DEVICE_APPEARANCE=1089
CONFIG_BT_SMP=y
