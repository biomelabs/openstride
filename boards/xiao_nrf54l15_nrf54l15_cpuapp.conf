# XIAO nRF54L15 Sense
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y  # LSM6DS3TR-C uses the lsm6dsl driver, not lsm6dso
CONFIG_LSM6DSL_TRIGGER_NONE=y

# external Qwiic aux sensors on i2c22 (D4/D5)
CONFIG_ADXL345=y
CONFIG_BMP388=y
CONFIG_BMP388_TRIGGER_NONE=y

# BLE running speed & cadence peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OpenStride"

# 0x0441 = 1089, appears as "Running/Walking Sensor, In-Shoe"
CONFIG_BT_DEVICE_APPEARANCE=1089
CONFIG_BT_SMP=y

# extra supervision margin while stride math runs on SoftDevice (units: 10 ms)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Standard BLE Battery Service (0x180F) + ADC for VBAT on P1.14 (AIN7)
# vbat_pwr regulator (P1.15) is toggled by battery.c before/after each read
CONFIG_BT_BAS=y
CONFIG_ADC=y

# 1024 bytes isn't enough for the GATT notify call stack from bt_bas_set_battery_level
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
